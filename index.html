<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title data-i18n="app_title">Ciao Work order issue</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
  :root {
    --bg1: rgba(0,255,255,0.12);
    --bg2: rgba(255,0,255,0.12);
    --bg3a: #04010c;
    --bg3b: #090118;
    --panel: rgba(12, 5, 28, 0.92);
    --panel-border: rgba(0,255,255,0.18);
    --text: #e8e0ff;
    --text-dim: rgba(232,224,255,0.65);
    --accent1: #ff3c00;
    --accent2: #ff00ff;
    --accent3: #00ffff;
    --accent3-dim: rgba(0,255,255,0.25);
    --btn-bg: linear-gradient(135deg, #c0003a, #9000cc);
    --btn-bg-hover: linear-gradient(135deg, #00d4cc, #cc00ff);
    --btn-glow: rgba(200,0,180,0.55);
    --btn-glow-hover: rgba(0,255,255,0.7);
    --font-display: 'Orbitron', monospace;
    --font-body: 'Rajdhani', sans-serif;
    --radius: 10px;
    --radius-lg: 16px;
  }

  * { box-sizing: border-box; }

  body {
    font-family: var(--font-body);
    font-size: 16px;
    letter-spacing: 0.3px;
    margin: 0; padding: 0;
    background:
      linear-gradient(120deg, var(--bg1), transparent 40%),
      linear-gradient(240deg, var(--bg2), transparent 40%),
      linear-gradient(0deg, var(--bg3a), var(--bg3b));
    background-size: 200% 200%;
    animation: cyberMove 12s linear infinite;
    color: var(--text);
    min-height: 100vh;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg3a); }
  ::-webkit-scrollbar-thumb {
    background: linear-gradient(var(--accent2), var(--accent3));
    border-radius: 3px;
  }

  @keyframes cyberMove {
    0%   { background-position: 0% 50%; }
    100% { background-position: 100% 50%; }
  }

  /* ── BRAND BAR ── */
  .brand-left, .brand-right {
    position: fixed; top: 0; z-index: 1000;
    display: flex; align-items: center; gap: 10px;
    padding: 10px 18px;
    background: rgba(4, 1, 14, 0.85);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--panel-border);
  }
  .brand-left  { left: 0;  border-right: 1px solid var(--panel-border); }
  .brand-right { right: 0; border-left:  1px solid var(--panel-border); }
  .brand-left img {
    height: 36px; width: auto; display: block;
    filter: drop-shadow(0 0 8px rgba(0,255,255,0.6));
  }
  .brand-right .brand-text {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 1.5px;
    color: #fff;
    text-shadow: 0 0 8px rgba(0,255,255,0.5), 0 0 16px rgba(255,0,255,0.3);
    white-space: nowrap;
    text-transform: uppercase;
  }

  .page-top-spacer { height: 72px; width: 100%; }

  /* ── APP CONTAINER ── */
  #app {
    max-width: 960px;
    margin: 0 auto 48px;
    padding: 32px 32px 48px;
    background: var(--panel);
    border-radius: var(--radius-lg);
    border: 1px solid var(--panel-border);
    box-shadow:
      0 0 40px rgba(0,255,255,0.15),
      0 0 80px rgba(255,0,255,0.08),
      inset 0 1px 0 rgba(255,255,255,0.05);
  }

  /* ── HEADER ── */
  .app-header {
    position: relative;
    text-align: center;
    padding-bottom: 20px;
    margin-bottom: 20px;
    border-bottom: 1px solid var(--panel-border);
  }

  h1 {
    font-family: var(--font-display);
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin: 0 0 4px;
    text-shadow:
      0 0 6px var(--accent3),
      0 0 14px var(--accent3),
      0 0 28px var(--accent2);
  }

  /* Language switcher – top-right of header */
  .lang-switcher {
    position: absolute;
    top: 0; right: 0;
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .lang-switcher button {
    padding: 5px 11px;
    font-size: 11px;
    font-family: var(--font-body);
    font-weight: 600;
    letter-spacing: 0.5px;
    border-radius: 6px;
    text-transform: none;
    cursor: pointer;
  }

  /* ── STEPS ── */
  .step { display: none; margin: 8px 0 24px; }
  .step.is-active { display: block; }
  #steps:focus { outline: none; }

  .step-title {
    font-family: var(--font-display);
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-top: 8px;
    margin-bottom: 16px;
    color: var(--accent3);
  }

  .visually-hidden {
    position: absolute!important;
    height: 1px; width: 1px;
    overflow: hidden;
    clip: rect(1px,1px,1px,1px);
    white-space: nowrap;
    border: 0; padding: 0; margin: -1px;
  }

  /* ── BUTTONS ── */
  .btn, .btn-secondary {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    background: var(--btn-bg);
    color: #fff;
    border: none;
    padding: 11px 22px;
    cursor: pointer;
    border-radius: var(--radius);
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    box-shadow: 0 0 12px var(--btn-glow), 0 2px 4px rgba(0,0,0,0.4);
    transition: all 0.2s ease;
    white-space: nowrap;
  }
  .btn:hover, .btn-secondary:hover {
    transform: translateY(-2px) scale(1.03);
    box-shadow: 0 0 18px var(--btn-glow-hover), 0 4px 12px rgba(0,0,0,0.4);
    background: var(--btn-bg-hover);
  }
  .btn:active, .btn-secondary:active {
    transform: translateY(0) scale(0.98);
  }
  .btn-secondary {
    background: linear-gradient(135deg, #2a2440, #1a1030);
    border: 1px solid rgba(0,255,255,0.22);
    box-shadow: 0 0 8px rgba(0,255,255,0.12);
    text-transform: none;
    letter-spacing: 0.3px;
    font-weight: 600;
  }
  .btn-secondary:hover {
    background: linear-gradient(135deg, #3a3060, #2a1850);
    border-color: rgba(0,255,255,0.45);
    box-shadow: 0 0 14px rgba(0,255,255,0.3);
  }
  .btn:disabled {
    opacity: 0.45;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  /* ── BUTTON LAYOUTS ── */
  .buttons-center {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
    margin-top: 16px;
    width: 100%;
  }

  /* Bottom action bar: back-left, copy-right */
  .bottom-actions {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    margin-top: 24px;
    padding-top: 16px;
    border-top: 1px solid var(--panel-border);
    flex-wrap: wrap;
  }
  .bottom-actions .btn-secondary[data-back] {
    order: -1;
  }

  /* Global back button – bottom center of #app */
  .global-back-button-container {
    display: flex;
    justify-content: center;
    margin-top: 24px;
    padding-top: 16px;
    border-top: 1px solid var(--panel-border);
  }
  #globalBackButton {
    display: none;
    min-width: 160px;
  }

  /* ── SEARCH AREA ── */
  #step1 {
    padding: 16px 0;
  }
  #step1 h2 {
    font-family: var(--font-display);
    font-size: 1.2rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 24px;
    color: var(--text);
    text-shadow: 0 0 10px var(--accent3);
  }
  #stepSearch {
    padding: 13px 18px;
    border-radius: var(--radius);
    border: 1px solid rgba(0,255,255,0.35);
    background: rgba(0,0,0,0.45);
    color: white;
    width: 100%;
    max-width: 420px;
    font-family: var(--font-body);
    font-size: 1rem;
    letter-spacing: 0.3px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  #stepSearch:focus {
    border-color: var(--accent3);
    box-shadow: 0 0 12px rgba(0,255,255,0.25);
  }
  #stepSearch::placeholder { color: rgba(255,255,255,0.35); }

  /* ── LISTS ── */
  ol, ul { padding-left: 22px; }
  li { color: #d8c8ff; line-height: 1.7; }

  /* ── IMAGES ── */
  .image-links { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 14px; }
  .help-image {
    width: 150px; height: 110px;
    object-fit: cover;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.22s;
    box-shadow: 0 0 10px rgba(0,0,0,0.5);
    border: 1px solid rgba(0,255,255,0.15);
  }
  .help-image:hover {
    transform: scale(1.08);
    box-shadow: 0 0 22px rgba(0,255,255,0.7);
    border-color: var(--accent3);
  }

  /* ── INFO CARD ── */
  .info-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(0,255,255,0.22);
    border-radius: var(--radius-lg);
    padding: 28px 28px 20px;
    margin: 8px 0 16px;
    text-align: left;
    box-shadow: inset 0 0 20px rgba(0,255,255,0.06);
  }
  .info-card p {
    margin: 14px 0;
    line-height: 1.7;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    padding-bottom: 10px;
    font-size: 15px;
  }
  .info-card p:last-child { border-bottom: none; }
  .info-card strong {
    color: var(--accent3);
    text-transform: uppercase;
    font-size: 11px;
    letter-spacing: 1.5px;
    margin-right: 10px;
    display: inline-block;
  }

  /* ── INLINE INPUT & REPHRASE ── */
  .inline-input {
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--accent3);
    color: #ffd3d3;
    padding: 2px 6px;
    margin-left: 6px;
    outline: none;
    width: 240px;
    font-family: var(--font-body);
    font-size: 15px;
    transition: border-color 0.2s;
  }
  .inline-input:focus { border-color: var(--accent2); }
  .rephrase-btn {
    background: linear-gradient(135deg, rgba(255,0,255,0.3), rgba(0,255,255,0.3));
    border: 1px solid rgba(0,255,255,0.4);
    color: white;
    border-radius: 4px;
    cursor: pointer;
    padding: 2px 9px;
    font-size: 11px;
    font-family: var(--font-body);
    font-weight: 600;
    letter-spacing: 0.5px;
    margin-left: 6px;
    transition: opacity 0.2s, transform 0.15s;
  }
  .rephrase-btn:hover { opacity: 0.85; transform: scale(1.04); }

  /* ── MODAL IMMAGINI ── */
  .modal {
    display: none; position: fixed; z-index: 2000;
    left: 0; top: 0; width: 100%; height: 100%;
    background-color: rgba(0,0,0,0.88);
    backdrop-filter: blur(4px);
  }
  .modal img {
    max-width: 90%; max-height: 90%;
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    border-radius: 10px;
    box-shadow: 0 0 30px rgba(0,255,255,0.4);
  }
  .modal-close {
    position: absolute; top: 18px; right: 22px;
    color: white; font-size: 28px; cursor: pointer;
    opacity: 0.75; transition: opacity 0.2s;
  }
  .modal-close:hover { opacity: 1; }

  /* ── MODAL RICERCA ── */
  .modal-content {
    background: var(--panel);
    margin: 12% auto;
    padding: 28px;
    border: 1px solid var(--accent3);
    width: 85%;
    max-width: 600px;
    border-radius: var(--radius-lg);
    box-shadow: 0 0 30px rgba(0,255,255,0.25), 0 0 60px rgba(255,0,255,0.12);
    position: relative;
  }
  .search-result-item {
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(0,255,255,0.15);
    padding: 14px 16px;
    margin-bottom: 10px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.18s ease;
    font-family: var(--font-body);
  }
  .search-result-item:hover {
    background: rgba(0,255,255,0.08);
    border-color: var(--accent3);
    transform: translateX(3px);
  }
  .search-result-item h4 {
    margin: 0 0 6px;
    font-family: var(--font-display);
    font-size: 13px;
    letter-spacing: 1px;
    color: var(--accent3);
  }
  .search-result-item p { margin: 0; font-size: 13px; opacity: 0.75; }
  </style>
</head>

<script src="toolkit-app-data.js"></script>
<script>
/* ===========================
   I18N – TRADUZIONI IT / EN
=========================== */

const translations = {
 it: {
  app_title: "Knowledge Base Toolkit",
  btn_next: "AVANTI",
  btn_back: "⬅ Indietro",
  btn_copy: "Copia cronologia",
  yes: "SÌ",
  no: "NO",
  copy_success: "Troubleshooting copiato negli appunti!",
  copy_error: "Errore durante la copia negli appunti.",
  btn_lang_it: "Italiano 🇮🇹",
  btn_lang_en: "English 🇬🇧",
  search_instr: "Cerca un'applicazione",
  search_btn: "CERCA",
 },
 en: {
  app_title: "Knowledge Base Toolkit",
  btn_next: "NEXT",
  btn_back: "⬅ Back",
  btn_copy: "Copy troubleshooting",
  yes: "YES",
  no: "NO",
  copy_success: "Troubleshooting copied to clipboard!",
  copy_error: "Unable to copy to clipboard.",
  btn_lang_it: "Italiano 🇮🇹",
  btn_lang_en: "English 🇬🇧",
  search_instr: "Search for an application",
  search_btn: "SEARCH",

 }
};

function escapeHtml(value) {
  return String(value)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function formatManagementText(text) {
  if (!text) return '';
  const escaped = escapeHtml(text).replace(/\n/g, '<br>');
  return escaped.replace(/([A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,6})/g,
    '<a href="mailto:$1" style="color:var(--accent3); text-decoration:none;">$1</a>'
  );
}

function buildAppSectionHtml(app) {
  const descriptionHtml = escapeHtml(app.description || '').replace(/\n/g, '<br>');
  const ownerHtml = escapeHtml(app.owner || '').replace(/\n/g, '<br>');
  const managementHtml = formatManagementText(app.management || '');

  return `
      <section id="${app.id}" class="step" aria-labelledby="title_${app.id}">
        <div class="info-card">
          <h2 id="title_${app.id}" class="step-title" style="border-bottom: 2px solid var(--accent3); padding-bottom: 10px; margin-bottom: 20px;">
            Nome applicativo: ${escapeHtml(app.name)}
          </h2>
          ${app.banner ? `<p><strong>Banner:</strong> ${escapeHtml(app.banner)}</p>` : ''}
          ${app.credentials ? `<p><strong>Credenziali di accesso:</strong> ${escapeHtml(app.credentials)}</p>` : ''}
          ${ownerHtml ? `<p><strong>Owner:</strong> ${ownerHtml}</p>` : ''}
          ${descriptionHtml ? `<p><strong>Descrizione:</strong> ${descriptionHtml}</p>` : ''}
          ${managementHtml ? `<p><strong>Gestione:</strong> ${managementHtml}</p>` : ''}
        </div>
        <div class="bottom-actions">
          <span></span>
          <button type="button" class="btn copy-btn" data-copy>📋 Copia Info</button>
        </div>
      </section>
  `;
}

function renderToolkitApps() {
  const listContainer = document.getElementById('toolkitAppList');
  const sectionsContainer = document.getElementById('toolkitAppSections');
  if (!listContainer || !sectionsContainer) return;
  
  if (typeof toolkitApps === 'undefined') {
    listContainer.innerHTML = '<p style="color:var(--accent1);">Errore: toolkit-app-data.js non caricato.</p>';
    return;
  }

  listContainer.innerHTML = '';
  sectionsContainer.innerHTML = '';

  toolkitApps.forEach((app) => {
    const button = document.createElement('button');
    button.type = 'button';
    button.className = 'btn-secondary';
    button.setAttribute('data-next', app.id);
    button.textContent = app.name;
    listContainer.appendChild(button);
    sectionsContainer.insertAdjacentHTML('beforeend', buildAppSectionHtml(app));
  });
}

/**
 * Gestisce il cambio lingua aggiornando gli elementi con l'attributo data-i18n.
 */
let currentLanguage = 'it';
function setLanguage(lang) {
  currentLanguage = lang;
  const t = translations[lang];
  if (!t) return;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (t[key]) {
      if (el.getAttribute('data-i18n-type') === 'html') {
        el.innerHTML = t[key];
      } else {
        el.innerText = t[key];
      }
    }
  });
}

/* ===========================
   NAVIGAZIONE
=========================== */

// Stato di navigazione
const historyStack = [];
let currentStepId = "step1";
const clickTrail = [];

function looksLikeHtml(str) {
  const s = String(str || "");
  return /<[^>]+>/.test(s) || /&[a-zA-Z#0-9]+;/.test(s);
}

function stripHTML(html) {
  const tmp = document.createElement("div");
  tmp.innerHTML = html;
  return (tmp.textContent || tmp.innerText || "").trim();
}

function getTextFromI18n(el, langCode) {
  const key = el.getAttribute("data-i18n");
  const type = el.getAttribute("data-i18n-type");
  if (key) {
    let val = (translations[langCode] && translations[langCode][key]) || (translations.it && translations.it[key]) || "";
    if (!val) return el.innerText.trim();
    if (type === "html" || looksLikeHtml(val)) return stripHTML(val);
    return String(val).trim();
  }
  // Gestione per elementi figli con traduzione (es: li > span)
  const i18nChild = el.querySelector('[data-i18n]');
  if (i18nChild) return getTextFromI18n(i18nChild, langCode);
  return el.innerText.trim();
}

// Selettori/ID predefiniti per gli slot di embed/fragment
const APP_HOST_ID = "app-host";      // per iframe
const APP_SLOT_ID = "app-slot";      // per HTML iniettato
const STEPS_WRAPPER_ID = "steps";     // contenitore focus principale

window.addEventListener("DOMContentLoaded", () => {
  renderToolkitApps();
  addRephraseButtons();
  showStep(currentStepId);

  // Event delegation per click su pulsanti
  document.addEventListener("click", async (e) => {
    const btn = e.target.closest("button");
    if (!btn) return;

    // 1) AVANTI: priorità agli attributi
    const nextId = btn.getAttribute("data-next");           // step interno
    const url     = btn.getAttribute("data-url");           // navigazione esterna
    const embed   = btn.getAttribute("data-embed");         // iframe
    const fragment= btn.getAttribute("data-fragment");      // fetch html

    try {
      if (nextId) {
        // Traccia il clic prima di cambiare step
        try {
          const itLabel = getTextFromI18n(btn, 'it');
          const enLabel = getTextFromI18n(btn, 'en');
          clickTrail.push({ stepId: currentStepId, it: itLabel, en: enLabel });
        } catch (err) { /* ignore */ }

        goTo(nextId);
        return;
      }
      if (url) {
        navigateTo(url);
        return;
      }
      if (embed) {
        await embedApp(embed);
        return;
      }
      if (fragment) {
        await injectFragment(fragment);
        return;
      }
    } catch (err) {
      console.error(err);
      alert("Si è verificato un errore durante il caricamento del contenuto.");
      return;
    }

    // 2) INDIETRO (Gestione unificata pulsante globale e attributo legacy)
    if (btn.id === 'globalBackButton' || btn.hasAttribute("data-back")) {
      goBack();
      return;
    }

    // 3) COPIA CRONOLOGIA
    if (btn.hasAttribute("data-copy")) {
      copyHistory();
      return;
    }
  });
});

/**
 * Aggiunge dinamicamente il tasto di riformulazione ✨ accanto agli input, 
 * Aggiunge dinamicamente il tasto di riformulazione accanto agli input, 
 * escludendo i campi nome/cognome.
 */
function addRephraseButtons() {
  document.querySelectorAll('.inline-input').forEach(input => {
    const parent = input.parentElement;
    if (!parent) return;
    const i18nEl = parent.querySelector('[data-i18n]');
    const i18nKey = i18nEl ? i18nEl.getAttribute('data-i18n') : '';
    const isNameField = ['step2c_li3', 'step2A3_li4', 'step2h3_li1', 'step2I_li2'].includes(i18nKey);
    
    if (!isNameField && !input.nextElementSibling?.classList.contains('rephrase-btn')) {
      const btn = document.createElement('button');
      btn.className = 'rephrase-btn';
      btn.type = 'button';
      btn.textContent = 'Riformula';
      btn.title = 'Riformula professionalmente';
      btn.onclick = (e) => {
        e.preventDefault();
        rephraseInput(btn);
      };
      input.after(btn);
    }
  });
}

async function rephraseInput(btn) {
  const input = btn.previousElementSibling;
  if (!input || !input.value || input.value.trim().length < 3) return;
  const originalBtnText = btn.textContent;
  btn.textContent = "⏳...";
  btn.disabled = true;
  
  const originalText = input.value.trim();
  
  // Ciclo IT -> EN -> IT per forzare la correzione grammaticale e stilistica
  const toEn = await translateUserInput(originalText, 'en', 'it');
  const backToIt = (toEn === originalText) ? originalText : await translateUserInput(toEn, 'it', 'en');
  
  if (backToIt && backToIt !== originalText) {
    // Applica una formattazione base (iniziale maiuscola e trim)
    let fixedText = backToIt.trim();
    fixedText = fixedText.charAt(0).toUpperCase() + fixedText.slice(1);
    input.value = fixedText;
  }
  
  btn.textContent = originalBtnText;
  btn.disabled = false;
}

// --------- Funzioni core: step interni ---------
function showStep(stepId) {
  const all = document.querySelectorAll(".step");
  all.forEach((s) => s.classList.remove("is-active"));

  const stepEl = document.getElementById(stepId);
  if (stepEl) {
    stepEl.classList.add("is-active");

    // Focus per screen reader / tastiera
    const main = document.getElementById(STEPS_WRAPPER_ID);
    if (main) main.focus();

    const globalBackButton = document.getElementById('globalBackButton');
    if (globalBackButton) {
      globalBackButton.style.display = historyStack.length > 0 ? 'inline-block' : 'none';
    }
  }
}

function goTo(stepId) {
  if (stepId === currentStepId) return;
  historyStack.push(currentStepId);
  currentStepId = stepId;
  showStep(stepId);

  // Pulizia eventuali contenuti dinamici quando si cambia step
  cleanupDynamicAreas();
}

function goBack() {
  if (historyStack.length === 0) return;
  currentStepId = historyStack.pop();

  // Rimuove l'ultimo clic per far sì che la cronologia rifletta il percorso a ritroso
  if (clickTrail.length > 0) {
    clickTrail.pop();
  }

  showStep(currentStepId);

  // Pulizia eventuali contenuti dinamici quando si cambia step
  cleanupDynamicAreas();
}

// --------- Funzioni nuove: integrazione web app ---------

// Navigazione a una nuova pagina (full load)
function navigateTo(url) {
  // Possibile validazione URL (opzionale)
  window.location.href = url;
}

// Embed di un'app esterna in iframe dentro lo step corrente
async function embedApp(url) {
  const stepEl = document.getElementById(currentStepId);
  if (!stepEl) throw new Error("Step corrente non trovato.");

  // Trova o crea il contenitore host
  let host = stepEl.querySelector(`#${CSS.escape(APP_HOST_ID)}`);
  if (!host) {
    host = document.createElement("div");
    host.id = APP_HOST_ID;
    host.className = "app-host";
    stepEl.appendChild(host);
  }

  // Svuota host e crea iframe
  host.innerHTML = "";
  const iframe = document.createElement("iframe");
  iframe.src = url;
  iframe.loading = "lazy";
  iframe.referrerPolicy = "no-referrer";
  // Valuta i permessi necessari per la tua app
  iframe.setAttribute("sandbox", "allow-scripts allow-forms allow-same-origin");
  iframe.style.width = "100%";
  iframe.style.minHeight = "70vh";
  iframe.style.border = "0";

  host.appendChild(iframe);
  host.hidden = false;

  // Facoltativo: gestione focus/accessibilità
  announceLive(stepEl, "Applicazione caricata nell'area incorporata.");
}

// Carica un frammento HTML e lo inietta nello step corrente
async function injectFragment(url) {
  const stepEl = document.getElementById(currentStepId);
  if (!stepEl) throw new Error("Step corrente non trovato.");

  if (window.location.protocol === 'file:') {
    console.warn("Fetch HTML fragments might be blocked by CORS on file:// protocol.");
    // Slot feedback
  }

  // Trova o crea lo slot
  let slot = stepEl.querySelector(`#${CSS.escape(APP_SLOT_ID)}`);
  if (!slot) {
    slot = document.createElement("div");
    slot.id = APP_SLOT_ID;
    slot.className = "app-slot";
    slot.setAttribute("role", "region");
    slot.setAttribute("aria-live", "polite");
    stepEl.appendChild(slot);
  }

  slot.textContent = "Caricamento…";

  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error(`Status: ${res.status}`);
    const html = await res.text();
    slot.innerHTML = html;
  } catch (err) {
    slot.innerHTML = `<p style="color:var(--accent1);">Errore caricamento locale: ${err.message}. Verifica di essere su un server o che il file esista.</p>`;
    return;
  }

  // Facoltativo: inizializza script all'interno del frammento, se presenti data-init, ecc.
  // Esempio:
  // const initScript = slot.querySelector('[data-init="run"]');
  // if (initScript) { ... }

  announceLive(stepEl, "Modulo caricato.");
}

// Pulizia aree dinamiche quando cambio step
function cleanupDynamicAreas() {
  const prevStep = document.querySelector(".step.is-active");
  // Non cancelliamo dell'attuale, ma assicuriamoci di nascondere dinamiche in step non attivi
  document.querySelectorAll(`#${CSS.escape(APP_HOST_ID)}, #${CSS.escape(APP_SLOT_ID)}`).forEach((el) => {
    // Se l'elemento non è dentro lo step attivo, lo svuotiamo per non lasciare iframes/app attive in background
    if (el.closest(".step") && !el.closest(".step").classList.contains("is-active")) {
      el.innerHTML = "";
      el.hidden = true;
    }
  });
}

// Annuncio ARIA-live (accessibilità)
function announceLive(container, message) {
  let live = container.querySelector('[aria-live="assertive"]');
  if (!live) {
    live = document.createElement("div");
    live.setAttribute("aria-live", "assertive");
    live.setAttribute("role", "status");
    live.className = "sr-only";
    container.appendChild(live);
  }
  live.textContent = message;
}

// Funzione helper per tradurre il testo inserito dall'utente (opzionale/automatica)
async function translateUserInput(text, targetLang, fromLang) {
  if (!text || text.trim() === "" || /^\d+$/.test(text)) return text; // Non traduce se vuoto o solo numeri (ID/UPC)
  // Assumiamo che l'operatore scriva sempre in italiano come base
  const sourceLang = fromLang || 'it';
  if (sourceLang === targetLang) return text;

  const controller = new AbortController();
  const timeoutId = setTimeout(() => controller.abort(), 5000);

  try {
    const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text.trim())}&langpair=${sourceLang}|${targetLang}&mt=1`, { signal: controller.signal });
    clearTimeout(timeoutId);
    const data = await res.json();
    let translated = data.responseData.translatedText || text;

    // Pulisce le entità HTML comuni che l'API potrebbe restituire
    translated = translated
      .replace(/&quot;/g, '"')
      .replace(/&#39;/g, "'")
      .replace(/&amp;/g, "&")
      .replace(/&lt;/g, "<")
      .replace(/&gt;/g, ">");

    return translated;
  } catch (e) {
    console.error("Errore di traduzione:", e);
    return text;
  }
}

// Copia cronologia degli step visitati
async function copyHistory() {
  const prefixEn = 'Please find below the information related to the requested application:';
  const prefixIt = 'Di seguito le informazioni relative all’applicativo richiesto:';

  const copyBtn = document.querySelector('[data-copy]');
  
  // Possibilità di riformulare i testi prima di copiare (richiesta utente)
  const filledInputs = Array.from(document.querySelectorAll('.inline-input')).filter(i => i.value.trim().length > 3);
  if (filledInputs.length > 0 && confirm("Vuoi riformulare automaticamente i testi inseriti per renderli più professionali?")) {
    for (const input of filledInputs) {
      const btn = input.nextElementSibling;
      if (btn && btn.classList.contains('rephrase-btn')) {
        await rephraseInput(btn);
      }
    }
  }

  const choiceByStep = {};
  clickTrail.forEach(c => { if (c.stepId) choiceByStep[c.stepId] = c; });
  const SKIP_STEPS = new Set(['step1', 'step2A']);

  const shouldKeepLine = (text) => {
    if (!text) return false;
    const t = text.trim().toLowerCase();
    if (t.startsWith("aprire un ticket") || t.startsWith("open a ticket")) return false;
    if (t.startsWith("categoria:") || t.startsWith("category:")) return false;
    return true;
  };

  const buildSection = async (langCode) => {
    let sec = '';
    // Utilizza la cronologia effettiva (stack + step corrente) per costruire la sezione
    const allSteps = [...historyStack, currentStepId];

    for (const stepId of allSteps) {
      if (SKIP_STEPS.has(stepId)) continue;
      const step = document.getElementById(stepId);
      if (!step) continue;

      const ch = choiceByStep[stepId];
      const chosen = ch ? (langCode === 'en' ? ch.en : ch.it) : '';

      let appendedChoice = false;
      const lines = step.querySelectorAll('p, li');
      for (const node of lines) {
        let line = getTextFromI18n(node, langCode);

        if (!shouldKeepLine(line)) continue;
        
        const input = node.querySelector('.inline-input');
        if (input && input.value) {
          // Identify if it's a name/surname field to avoid translation
          const i18nEl = node.querySelector('[data-i18n]');
          const i18nKey = i18nEl ? i18nEl.getAttribute('data-i18n') : '';
          const isNameField = ['step2c_li3', 'step2A3_li4', 'step2h3_li1', 'step2I_li2'].includes(i18nKey);

          // Traduce il valore dell'input solo se la lingua della sezione è diversa dalla lingua corrente
          const valToDisplay = (langCode !== currentLanguage && !isNameField) 
            ? await translateUserInput(input.value, langCode) 
            : input.value;
          line += " " + valToDisplay;
        }

        if (!line) continue;

        if (!appendedChoice && chosen && node.tagName.toLowerCase() === 'p') {
          line = `${line} → ${chosen}`;
          appendedChoice = true;
        }
        sec += `• ${line}\n`;
      }
      if (chosen && !appendedChoice) {
        sec += `→ ${chosen}\n`;
      }
      sec += `\n`;
    }
    return sec.trim();
  };

  // Mostra un feedback visivo se necessario, dato che la traduzione è asincrona
  const originalBtnText = copyBtn ? copyBtn.innerText : "Copia";
  if (copyBtn) copyBtn.innerText = "...";

  const itSection = await buildSection('it');
  const enSection = await buildSection('en');

  const finalOutput = `${prefixEn}\n\n\n${enSection ? enSection + '\n' : ''}\n--------------------------------------\n\n${prefixIt}\n\n\n${itSection}`;

  navigator.clipboard.writeText(finalOutput)
    .then(() => alert(translations[currentLanguage].copy_success))
    .catch(() => alert(translations[currentLanguage].copy_error))
    .finally(() => {
      if (copyBtn) copyBtn.innerText = originalBtnText;
    });
}
function openModal(src) {
  document.getElementById('modalImage').src = src;
  document.getElementById('imageModal').style.display = 'block';
}
function closeModal() {
  document.getElementById('imageModal').style.display = 'none';
}

// Funzione per visualizzare i risultati di ricerca multipli
function displaySearchResults(results) {
  const searchResultsList = document.getElementById('searchResultsList');
  searchResultsList.innerHTML = ''; // Pulisce i risultati precedenti

  results.forEach(result => {
    const item = document.createElement('div');
    item.className = 'search-result-item';
    item.innerHTML = `<h4>${result.title} (ID: ${result.id})</h4><p>${result.snippet}</p>`;
    item.onclick = (event) => {
      event.stopPropagation(); // Impedisce al modal di chiudersi quando si clicca un elemento
      // Traccia la navigazione via ricerca per mantenere coerente il clickTrail
      clickTrail.push({ stepId: currentStepId, it: "[Ricerca]", en: "[Search]" });
      goTo(result.id);
      closeSearchResultsModal();
    };
    searchResultsList.appendChild(item);
  });

  document.getElementById('searchResultsModal').style.display = 'block';
}

// Funzione per chiudere il modal dei risultati di ricerca
function closeSearchResultsModal() {
  document.getElementById('searchResultsModal').style.display = 'none';
}

function performSearch() {
  const query = document.getElementById('stepSearch').value.toLowerCase().trim();
  if (!query) return;

  const foundSteps = [];
  const steps = document.querySelectorAll('.step');

  for (const step of steps) {
    if (step.id === 'step1') continue;

    // Cloniamo lo step per manipolare il testo senza alterare la pagina
    const stepClone = step.cloneNode(true);
    // Rimuoviamo i bottoni dal clone così la ricerca ignora le etichette dei tasti
    stepClone.querySelectorAll('button, .btn, .btn-secondary').forEach(b => b.remove());

    // Usiamo textContent perché funziona anche sugli elementi nascosti (display:none)
    const stepText = stepClone.textContent.toLowerCase();

    if (stepText.includes(query)) {
      const titleElement = step.querySelector('.step-title, h2');
      const title = titleElement ? titleElement.textContent.trim() : `Step ${step.id}`;

      // Estrai un piccolo snippet di testo attorno alla parola chiave
      let snippet = '';
      const queryIndex = stepText.indexOf(query);
      if (queryIndex !== -1) {
        const start = Math.max(0, queryIndex - 50); // 50 caratteri prima
        const end = Math.min(stepText.length, queryIndex + query.length + 100); // 100 caratteri dopo
        snippet = stepText.substring(start, end);
        if (start > 0) snippet = '...' + snippet;
        if (end < stepText.length) snippet = snippet + '...';
      }

      foundSteps.push({ id: step.id, title: title, snippet: snippet });
    }
  }

  if (foundSteps.length === 0) {
    alert("Nessun risultato trovato per: " + query);
  } else if (foundSteps.length === 1) {
    goTo(foundSteps[0].id);
  } else {
    displaySearchResults(foundSteps);
  }
}

// Gestione tasto Invio nell'input di ricerca
document.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && document.activeElement.id === "stepSearch") {
    performSearch();
  }
});
